services:
  - type: web
    name: verbatim-ai-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: GOOGLE_FACTCHECK_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./backend/data/transcripts.db
      - key: FAISS_INDEX_PATH
        value: ./backend/data/faiss_index.bin
      - key: PYTHON_VERSION
        value: "3.11.0"
